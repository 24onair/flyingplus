<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IGC Flight Library | FlyingPlus</title>
    <link rel="stylesheet" href="./viewer.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">Flight Library</p>
        <div class="hero-actions">
          <a class="playback-button secondary-link" href="/">메인 홈으로</a>
        </div>
        <h1>업로드한 IGC 비행들을 라이브러리처럼 정리합니다.</h1>
        <p class="subtitle">
          IGC 파일을 올리면 즉시 목록에 쌓이고, 각 비행에서 상세 분석 화면으로 이동해 지도와 고도 프로파일을 바로 검토할 수 있습니다.
        </p>
      </section>

      <section class="panel upload-panel">
        <form id="upload-form" class="upload-form">
          <input id="upload-input" type="file" accept=".igc" required />
          <button type="submit" class="playback-button">IGC 업로드</button>
          <a href="/" class="playback-button secondary-link">메인 홈으로</a>
          <a href="./index.html" class="playback-button secondary-link">샘플 상세 보기</a>
        </form>
        <p id="upload-status" class="status">업로드할 IGC 파일을 선택하세요.</p>
      </section>

      <section id="flight-list" class="stack panel list-panel">
        <div class="status">비행 리스트를 불러오는 중...</div>
      </section>
    </main>
    <script type="module" src="./list.js"></script>
  </body>
</html>
