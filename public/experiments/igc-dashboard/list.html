<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IGC Flights</title>
    <link rel="stylesheet" href="./viewer.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">Independent Prototype</p>
        <div class="hero-actions">
          <a class="playback-button secondary-link" href="/">XC 도우미 홈으로</a>
        </div>
        <h1>IGC Flight List</h1>
        <p class="subtitle">
          IGC 파일을 업로드하고 날짜순으로 관리합니다. 항목을 누르면 상세 뷰어로 이동합니다.
        </p>
      </section>

      <section class="panel upload-panel">
        <form id="upload-form" class="upload-form">
          <input id="upload-input" type="file" accept=".igc" required />
          <button type="submit" class="playback-button">IGC 업로드</button>
          <a href="/" class="playback-button secondary-link">메인 프로젝트로</a>
          <a href="./index.html" class="playback-button secondary-link">샘플 상세 보기</a>
        </form>
        <p id="upload-status" class="status">업로드할 IGC 파일을 선택하세요.</p>
      </section>

      <section id="flight-list" class="stack panel list-panel">
        <div class="status">비행 리스트를 불러오는 중...</div>
      </section>
    </main>
    <script type="module" src="./list.js"></script>
  </body>
</html>
